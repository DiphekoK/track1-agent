<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Token-Efficient Query Router</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { background: oklch(0.15 0.012 264); }
  a { color: var(--accent); }
  a:hover { color: oklch(0.9 0.12 150); }
  ::selection { background: oklch(0.82 0.15 150 / 0.3); }
  textarea::placeholder { color: oklch(0.5 0.01 264); }
  textarea:focus { outline: none; border-color: var(--accent) !important; }
  button { font-family: inherit; }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.25; } }
  @keyframes fadein { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  :root {
    --bg: oklch(0.15 0.012 264);
    --panel: oklch(0.205 0.014 264);
    --panel2: oklch(0.25 0.014 264);
    --border: oklch(0.31 0.012 264);
    --text: oklch(0.96 0.004 264);
    --muted: oklch(0.67 0.012 264);
    --faint: oklch(0.5 0.01 264);
    --cyan: oklch(0.8 0.12 205);
    --amber: oklch(0.83 0.14 72);
    --red: oklch(0.72 0.15 25);
    --accent: #7CE38B;
  }

  #root {
    min-height: 100vh;
    background: radial-gradient(1200px 600px at 50% -10%, oklch(0.2 0.02 264), oklch(0.15 0.012 264) 60%);
    color: var(--text);
    font-family: 'Space Grotesk', system-ui, sans-serif;
    padding: 40px 24px 72px;
    display: flex;
    justify-content: center;
  }
  #app-inner { width: 100%; max-width: 1080px; display: flex; flex-direction: column; gap: 22px; }

  .mono { font-family: 'JetBrains Mono', monospace; }
  .chip-btn { background: var(--panel2); color: var(--muted); border: 1px solid var(--border); border-radius: 999px; padding: 6px 12px; font: 500 12px 'JetBrains Mono', monospace; cursor: pointer; transition: background 0.15s, color 0.15s; }
  .chip-btn:hover { background: oklch(0.29 0.014 264); color: var(--text); }
  .reset-btn { background: transparent; color: var(--muted); border: 1px solid var(--border); border-radius: 8px; padding: 7px 14px; font: 500 12px 'JetBrains Mono', monospace; cursor: pointer; transition: color 0.15s, border-color 0.15s; }
  .reset-btn:hover { color: var(--text); border-color: var(--faint); }
  .step-card { flex: 1; min-width: 230px; background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 16px 16px 14px; display: flex; flex-direction: column; gap: 9px; border-top: 3px solid; }
  .bar { width: 38%; border-radius: 5px 5px 0 0; min-height: 3px; transition: height 0.5s cubic-bezier(0.2,0.8,0.2,1); }
  .log-row { display: grid; grid-template-columns: 1fr 90px 92px 92px 100px; gap: 0; align-items: center; padding: 11px 18px; border-bottom: 1px solid oklch(0.26 0.012 264); font: 400 13px 'Space Grotesk'; }
  .banner { padding: 10px 16px; border-radius: 10px; font: 500 12px 'JetBrains Mono', monospace; }
</style>
</head>
<body>
<div id="root"><div id="app-inner"></div></div>

<script>
"use strict";

/* -------------------------------------------------------------------
 * Standalone reimplementation of the "Query Router" design mockup,
 * wired to the REAL project instead of a browser-side simulation.
 *
 * The original .dc.html ran on a proprietary runtime (React + a
 * template engine + a window.claude.complete() bridge) that only
 * exists inside claude.ai/design's preview sandbox, and used
 * window.claude.complete() to call actual Claude models (Haiku/Sonnet)
 * for its demo answers - neither of those is what this project
 * actually does. This version calls web/server.py, a small local
 * backend that reuses categories.py / local_llm.py / fireworks_client.py
 * / baseline_router.py / router/infer_router.py directly, so every
 * number on screen (routing decision, confidence, token counts,
 * answer text) is real, not simulated. Model tier labels come from
 * GET /config, i.e. whatever's actually in your .env - not hardcoded.
 *
 * Run: python web/server.py, then open http://localhost:8787/
 * ------------------------------------------------------------------- */

const CONFIG = {
  accent: "#7CE38B",
  apiBase: "", // same origin as web/server.py serves both the page and the API
  localModelLabel: "local model",
  fireworksModelLabel: "Fireworks model",
  backendReachable: null, // null = not checked yet, true/false after first /config attempt
};

document.documentElement.style.setProperty("--accent", CONFIG.accent);

let state = {
  prompt: "",
  running: false,
  progress: 0,       // completed steps 0..3
  category: null,
  finetuned: null,   // { backend, confidence, note }
  baseline: null,    // { backend, tokens, error }
  answerBackend: null,
  answerText: "",
  answerTokens: 0,
  answerError: null,
  history: [],
};

function setState(patch) {
  state = typeof patch === "function" ? { ...state, ...patch(state) } : { ...state, ...patch };
  render();
}

function estTokens(s) {
  return Math.max(1, Math.round((s || "").length / 3.6));
}
function sleep(ms) {
  return new Promise((r) => setTimeout(r, ms));
}

async function fetchConfig() {
  try {
    const resp = await fetch(CONFIG.apiBase + "/config");
    if (!resp.ok) throw new Error("config endpoint " + resp.status);
    const cfg = await resp.json();
    CONFIG.localModelLabel = cfg.localModel || CONFIG.localModelLabel;
    CONFIG.fireworksModelLabel = cfg.fireworksModel || (cfg.fireworksError ? "not configured" : CONFIG.fireworksModelLabel);
    CONFIG.backendReachable = true;
  } catch (e) {
    CONFIG.backendReachable = false;
  }
  render();
}

// Used only if web/server.py isn't reachable at all - a rough local
// approximation so the page still demos something, clearly labeled as
// such rather than pretending it's a real decision.
function simulateFallback(q) {
  const text = q.toLowerCase();
  const words = q.trim().split(/\s+/).filter(Boolean).length;
  let score = 0;
  const hard = /\b(why|explain|analyz|analys|compare|design|prove|derive|optimi|debug|refactor|architect|strategy|implication|tradeoff|trade-off|essay|summar|evaluate|critique|reason|step by step|pros and cons|walk me through|how does|how do)\b/;
  const codey = /(function |class |def |import |select |=>|algorithm|regex|\bapi\b|schema)/;
  const simple = /^(what is|who is|when |where |define |convert |how many|how much|list |name |translate |\d+\s*[-+*/x×]\s*\d+)/;
  if (words > 28) score += 2; else if (words > 13) score += 1;
  if (hard.test(text)) score += 2;
  if (codey.test(text)) score += 1;
  if (/\?[^?]*\?/.test(q)) score += 1;
  if (simple.test(text)) score -= 2;
  if (words <= 4) score -= 1;
  const backend = score >= 2 ? "fireworks" : "local";
  return {
    category: "unknown",
    finetuned: { backend, confidence: null, note: "backend unreachable - local JS approximation, not the real router" },
    baseline: { backend, tokens: estTokens(q) + 20, error: null },
    answer: {
      backend,
      text: "[No backend reachable] Start it with `python web/server.py` from the repo root to see real routing decisions and real answers here.",
      tokens: 0,
      error: "backend unreachable",
    },
  };
}

async function runPipeline(prompt) {
  try {
    const resp = await fetch(CONFIG.apiBase + "/pipeline", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prompt }),
    });
    if (!resp.ok) throw new Error("pipeline endpoint " + resp.status);
    CONFIG.backendReachable = true;
    return await resp.json();
  } catch (e) {
    CONFIG.backendReachable = false;
    return simulateFallback(prompt);
  }
}

function onInput(e) {
  setState({ prompt: e.target.value });
}
function pickExample(t) {
  return () => setState({ prompt: t });
}
function reset() {
  setState({ history: [], progress: 0, answerText: "", answerBackend: null, finetuned: null, baseline: null });
}

async function run() {
  if (state.running || !state.prompt.trim()) return;
  const q = state.prompt.trim();
  setState({ running: true, progress: 0, answerText: "", answerError: null, finetuned: null, baseline: null });

  const t0 = performance.now();
  const result = await runPipeline(q);
  const latency = Math.max(0.3, +(performance.now() - t0).toFixed(1));

  // staged reveal for the same pacing as the original design, using the
  // one real response we already have rather than 3 separate round trips
  await sleep(450);
  setState({ category: result.category, finetuned: { ...result.finetuned, latencyMs: latency }, progress: 1 });

  await sleep(300);
  setState({ baseline: result.baseline, progress: 2 });

  await sleep(300);
  const ans = result.answer;
  const qTok = estTokens(q);
  const answerTokens = ans.tokens || (qTok + estTokens(ans.text || ""));
  const finetunedQueryTokens = answerTokens;
  const baselineQueryTokens = (result.baseline.tokens || 0) + answerTokens;

  setState((s) => ({
    answerBackend: ans.backend,
    answerText: ans.text || "",
    answerTokens,
    answerError: ans.error,
    progress: 3,
    running: false,
    history: [...s.history, {
      query: q.length > 42 ? q.slice(0, 42) + "…" : q,
      backend: ans.backend,
      ft: finetunedQueryTokens,
      bl: baselineQueryTokens,
      saved: result.baseline.tokens || 0,
    }],
  }));
}

function modelLabelFor(backend) {
  return backend === "fireworks" ? CONFIG.fireworksModelLabel : CONFIG.localModelLabel;
}

function buildSteps() {
  const s = state;
  const acc = { idle: "var(--faint)", active: "var(--accent)", cyan: "var(--cyan)", amber: "var(--amber)", red: "var(--red)" };
  const st = (n) => (s.progress >= n ? "done" : (s.running && s.progress === n - 1 ? "active" : "idle"));
  const s1 = st(1), s2 = st(2), s3 = st(3);
  const tierColor = (backend) => (backend === "fireworks" ? acc.amber : acc.cyan);

  const finetunedStatus = s.finetuned
    ? `${s.finetuned.backend}${s.finetuned.confidence != null ? " · " + s.finetuned.confidence.toFixed(2) + " conf" : ""} · ${s.finetuned.latencyMs}ms · 0 tokens${s.finetuned.note ? " · " + s.finetuned.note : ""}`
    : (s1 === "active" ? "Classifying locally…" : "Idle");

  const baselineStatus = s.baseline
    ? (s.baseline.error ? `error: ${s.baseline.error}` : `${s.baseline.backend} · ${s.baseline.tokens} tokens`)
    : (s2 === "active" ? "Calling classifier…" : "Idle");

  const answerStatus = s.progress >= 3
    ? (s.answerError ? `error: ${s.answerError}` : `${modelLabelFor(s.answerBackend)} · ~${s.answerTokens} tokens`)
    : (s3 === "active" ? "Generating…" : "Idle");

  return [
    {
      n: "1", title: "Fine-tuned router", meta: "Local forward pass · on-device · 0 tokens",
      accent: s1 === "done" ? tierColor(s.finetuned && s.finetuned.backend) : (s1 === "active" ? acc.active : acc.idle),
      dotAnim: s1 === "active" ? "blink 1s ease-in-out infinite" : "none",
      statusLabel: finetunedStatus,
    },
    {
      n: "2", title: "Prompt-based baseline", meta: "Real classifier LLM call · tokens spent to decide",
      accent: s2 === "done" ? acc.red : (s2 === "active" ? acc.active : acc.idle),
      dotAnim: s2 === "active" ? "blink 1s ease-in-out infinite" : "none",
      statusLabel: baselineStatus,
    },
    {
      n: "3", title: "Answer generation", meta: "Routed to the tier the fine-tuned router chose",
      accent: s3 === "done" ? tierColor(s.answerBackend) : (s3 === "active" ? acc.active : acc.idle),
      dotAnim: s3 === "active" ? "blink 1s ease-in-out infinite" : "none",
      statusLabel: answerStatus,
    },
  ];
}

const EXAMPLES = [
  "What is 47 + 128?",
  "Convert 5 miles to kilometers",
  "Explain how gradient descent works and why momentum helps convergence",
  "Refactor a nested loop into a comprehension and explain the tradeoffs",
];

function esc(s) {
  return String(s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

function render() {
  const s = state;
  const finetunedTotal = s.history.reduce((a, h) => a + h.ft, 0);
  const baselineTotal = s.history.reduce((a, h) => a + h.bl, 0);
  const saved = baselineTotal - finetunedTotal;
  const savedPct = baselineTotal ? Math.round((saved / baselineTotal) * 100) : 0;
  const maxVal = Math.max(1, ...s.history.map((h) => Math.max(h.ft, h.bl)));
  const runDisabled = s.running || !s.prompt.trim();
  const showAnswer = s.progress >= 3 && (s.answerText || s.answerError);
  const hasHistory = s.history.length > 0;
  const chosenTierColor = s.answerBackend === "fireworks" ? "var(--amber)" : "var(--cyan)";
  const chosenModelLabel = modelLabelFor(s.answerBackend);

  const steps = buildSteps();

  const stepsHtml = steps.map((step) => `
    <div class="step-card" style="border-top-color:${step.accent};">
      <div style="display:flex; align-items:center; gap:10px;">
        <div style="width:26px; height:26px; border-radius:8px; display:grid; place-items:center; font:600 13px 'JetBrains Mono',monospace; background:var(--panel2); color:${step.accent}; border:1px solid var(--border);">${step.n}</div>
        <div style="font:600 14px 'Space Grotesk'; letter-spacing:-0.01em;">${step.title}</div>
      </div>
      <div style="font:400 12px/1.4 'JetBrains Mono',monospace; color:var(--muted);">${step.meta}</div>
      <div style="margin-top:auto; padding-top:6px; font:500 12px 'JetBrains Mono',monospace; color:${step.accent}; display:flex; align-items:center; gap:7px;">
        <span style="width:7px; height:7px; border-radius:50%; background:${step.accent}; animation:${step.dotAnim};"></span>${esc(step.statusLabel)}
      </div>
    </div>
  `).join("");

  const chipsHtml = EXAMPLES.map((t, i) => `
    <button class="chip-btn" data-example-idx="${i}">${esc(t.length > 30 ? t.slice(0, 30) + "…" : t)}</button>
  `).join("");

  const answerHtml = !showAnswer ? "" : `
    <div style="display:flex; flex-direction:column; gap:12px; animation:fadein 0.35s ease;">
      <div style="display:flex; align-items:center; gap:12px; padding:12px 16px; background:linear-gradient(90deg, oklch(0.24 0.045 150), var(--panel) 90%); border:1px solid var(--border); border-radius:12px;">
        <span style="font:600 20px 'Space Grotesk'; color:var(--accent);">${s.baseline ? s.baseline.tokens : 0}</span>
        <span style="font:400 13px/1.4 'Space Grotesk'; color:var(--muted);">tokens the baseline spent just to classify this query — the fine-tuned router decided it for free.</span>
      </div>
      <div style="background:var(--panel); border:1px solid var(--border); border-radius:16px; overflow:hidden;">
        <div style="display:flex; align-items:center; gap:10px; padding:13px 18px; border-bottom:1px solid var(--border); background:var(--panel2);">
          <span style="width:9px; height:9px; border-radius:2px; background:${chosenTierColor};"></span>
          <span style="font:600 13px 'Space Grotesk';">Answer</span>
          <span style="font:500 12px 'JetBrains Mono',monospace; color:var(--muted);">via ${esc(chosenModelLabel)}</span>
          <span style="margin-left:auto; font:500 12px 'JetBrains Mono',monospace; color:var(--faint);">~${s.answerTokens} tokens</span>
        </div>
        <div style="padding:18px 20px; font:400 15px/1.6 'Space Grotesk',sans-serif; color:oklch(0.9 0.006 264); white-space:pre-wrap;">${esc(s.answerError ? "Error: " + s.answerError : s.answerText)}</div>
      </div>
    </div>
  `;

  const chartHtml = !hasHistory ? "" : s.history.map((h) => `
    <div style="flex:1; min-width:64px; display:flex; flex-direction:column; align-items:center; gap:8px; height:100%;">
      <div style="flex:1; width:100%; display:flex; align-items:flex-end; justify-content:center; gap:6px;">
        <div title="fine-tuned" class="bar" style="background:var(--accent); height:${Math.round((h.ft / maxVal) * 100)}%;"></div>
        <div title="baseline" class="bar" style="background:var(--red); height:${Math.round((h.bl / maxVal) * 100)}%;"></div>
      </div>
      <span style="font:400 10px 'JetBrains Mono',monospace; color:var(--faint); text-align:center; max-width:80px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${esc(h.query)}</span>
    </div>
  `).join("");

  const logRowsHtml = !hasHistory ? "" : s.history.map((h) => {
    const tierColor = h.backend === "fireworks" ? "var(--amber)" : "var(--cyan)";
    return `
    <div class="log-row">
      <span style="color:var(--text); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; padding-right:10px;">${esc(h.query)}</span>
      <span style="text-align:right; font:500 11px 'JetBrains Mono',monospace; color:${tierColor};">${esc(h.backend || "?")}</span>
      <span style="text-align:right; font:500 13px 'JetBrains Mono',monospace; color:var(--cyan);">${h.ft}</span>
      <span style="text-align:right; font:500 13px 'JetBrains Mono',monospace; color:var(--red);">${h.bl}</span>
      <span style="text-align:right; font:600 13px 'JetBrains Mono',monospace; color:var(--accent);">${h.saved}</span>
    </div>`;
  }).join("");

  const historyHtml = !hasHistory ? "" : `
    <div style="display:grid; grid-template-columns:1fr; gap:20px;">
      <div style="background:var(--panel); border:1px solid var(--border); border-radius:16px; padding:18px 20px 22px; display:flex; flex-direction:column; gap:16px;">
        <div style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px;">
          <span style="font:600 14px 'Space Grotesk';">Tokens per query</span>
          <div style="display:flex; gap:16px;">
            <span style="display:inline-flex; align-items:center; gap:6px; font:500 12px 'JetBrains Mono',monospace; color:var(--muted);"><span style="width:10px; height:10px; border-radius:2px; background:var(--accent);"></span>Fine-tuned</span>
            <span style="display:inline-flex; align-items:center; gap:6px; font:500 12px 'JetBrains Mono',monospace; color:var(--muted);"><span style="width:10px; height:10px; border-radius:2px; background:var(--red);"></span>Baseline</span>
          </div>
        </div>
        <div style="display:flex; align-items:flex-end; gap:14px; height:190px; overflow-x:auto; padding-top:6px;">${chartHtml}</div>
      </div>

      <div style="background:var(--panel); border:1px solid var(--border); border-radius:16px; overflow:hidden;">
        <div style="padding:14px 18px; border-bottom:1px solid var(--border); font:600 14px 'Space Grotesk';">Query log</div>
        <div style="display:grid; grid-template-columns:1fr 90px 92px 92px 100px; gap:0; font:500 11px 'JetBrains Mono',monospace; color:var(--faint); padding:10px 18px; border-bottom:1px solid var(--border); letter-spacing:0.03em;">
          <span>QUERY</span><span style="text-align:right;">ROUTE</span><span style="text-align:right;">FINE-TUNED</span><span style="text-align:right;">BASELINE</span><span style="text-align:right;">SAVED</span>
        </div>
        ${logRowsHtml}
        <div style="display:flex; justify-content:flex-end; padding:12px 18px;">
          <button class="reset-btn" id="reset-btn">Reset session</button>
        </div>
      </div>
    </div>
  `;

  const runBtnDisabledAttr = runDisabled ? "disabled" : "";
  const runBtnStyle = `border:none; border-radius:11px; padding:11px 24px; font:600 14px 'Space Grotesk'; cursor:${runDisabled ? "not-allowed" : "pointer"}; background:${runDisabled ? "oklch(0.3 0.014 264)" : "var(--accent)"}; color:${runDisabled ? "var(--faint)" : "oklch(0.2 0.03 150)"}; transition:filter 0.15s;`;

  const backendBannerHtml = CONFIG.backendReachable !== false ? "" : `
    <div class="banner" style="background:oklch(0.28 0.08 40); color:oklch(0.85 0.1 60); border:1px solid oklch(0.4 0.1 40);">
      web/server.py isn't reachable - showing a local JS approximation, not real routing/answers. Run <code>python web/server.py</code> from the repo root, then reload this page.
    </div>
  `;

  document.getElementById("app-inner").innerHTML = `
    ${backendBannerHtml}
    <div style="display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:20px;">
      <div style="display:flex; flex-direction:column; gap:10px; max-width:640px;">
        <div style="display:inline-flex; align-items:center; gap:8px; align-self:flex-start; padding:5px 11px; border:1px solid var(--border); border-radius:999px; background:oklch(0.2 0.014 264); font:500 11px 'JetBrains Mono',monospace; color:var(--muted); letter-spacing:0.04em;">
          <span style="width:6px; height:6px; border-radius:50%; background:var(--accent);"></span>AMD DEVELOPER HACKATHON · ACT II · TRACK 1
        </div>
        <h1 style="margin:0; font:700 33px/1.05 'Space Grotesk',sans-serif; letter-spacing:-0.025em;">Token-Efficient Query Router</h1>
        <p style="margin:0; font:400 15px/1.5 'Space Grotesk',sans-serif; color:var(--muted);">A fine-tuned local router classifies every query in a zero-token forward pass, then routes cheap queries to a small model and escalates hard ones. A prompt-based baseline burns tokens just to make the same decision.</p>
      </div>
      <div style="display:flex; flex-direction:column; gap:8px; min-width:200px;">
        <div style="font:500 11px 'JetBrains Mono',monospace; color:var(--faint); letter-spacing:0.05em;">MODEL TIERS</div>
        <div style="display:flex; align-items:center; gap:10px; padding:9px 12px; background:var(--panel); border:1px solid var(--border); border-radius:10px;">
          <span style="width:8px; height:8px; border-radius:2px; background:var(--cyan);"></span>
          <span style="font:600 13px 'Space Grotesk';">Local</span>
          <span style="margin-left:auto; font:500 12px 'JetBrains Mono',monospace; color:var(--muted);">${esc(CONFIG.localModelLabel)}</span>
        </div>
        <div style="display:flex; align-items:center; gap:10px; padding:9px 12px; background:var(--panel); border:1px solid var(--border); border-radius:10px;">
          <span style="width:8px; height:8px; border-radius:2px; background:var(--amber);"></span>
          <span style="font:600 13px 'Space Grotesk';">Fireworks</span>
          <span style="margin-left:auto; font:500 12px 'JetBrains Mono',monospace; color:var(--muted);">${esc(CONFIG.fireworksModelLabel)}</span>
        </div>
      </div>
    </div>

    <div style="display:grid; grid-template-columns:1.1fr 1fr; gap:1px; background:var(--border); border:1px solid var(--border); border-radius:18px; overflow:hidden;">
      <div style="background:linear-gradient(150deg, oklch(0.24 0.05 150), var(--panel) 70%); padding:26px 28px; display:flex; flex-direction:column; gap:6px; position:relative;">
        <div style="font:500 11px 'JetBrains Mono',monospace; color:oklch(0.85 0.1 150); letter-spacing:0.06em;">TOKENS SAVED BY FINE-TUNING · THIS SESSION</div>
        <div style="display:flex; align-items:baseline; gap:10px;">
          <span style="font:700 64px/1 'Space Grotesk'; letter-spacing:-0.03em; color:var(--accent);">${baselineTotal ? savedPct + "%" : "—"}</span>
          <span style="font:600 22px 'Space Grotesk'; color:oklch(0.85 0.08 150);">fewer</span>
        </div>
        <div style="font:400 13px 'JetBrains Mono',monospace; color:var(--muted); margin-top:2px;">${(baselineTotal ? saved : 0).toLocaleString()} tokens never spent vs. the prompt-based baseline</div>
      </div>
      <div style="background:var(--panel); padding:22px 24px; display:grid; grid-template-columns:1fr 1fr; gap:20px 24px; align-content:center;">
        <div style="display:flex; flex-direction:column; gap:3px;">
          <span style="font:500 11px 'JetBrains Mono',monospace; color:var(--faint); letter-spacing:0.04em;">QUERIES RUN</span>
          <span style="font:600 26px 'Space Grotesk';">${s.history.length}</span>
        </div>
        <div style="display:flex; flex-direction:column; gap:3px;">
          <span style="font:500 11px 'JetBrains Mono',monospace; color:var(--faint); letter-spacing:0.04em;">TOKENS SAVED</span>
          <span style="font:600 26px 'Space Grotesk'; color:var(--accent);">${(baselineTotal ? saved : 0).toLocaleString()}</span>
        </div>
        <div style="display:flex; flex-direction:column; gap:3px;">
          <span style="font:500 11px 'JetBrains Mono',monospace; color:var(--faint); letter-spacing:0.04em;">FINE-TUNED TOTAL</span>
          <span style="font:600 20px 'JetBrains Mono',monospace; color:var(--cyan);">${finetunedTotal.toLocaleString()}</span>
        </div>
        <div style="display:flex; flex-direction:column; gap:3px;">
          <span style="font:500 11px 'JetBrains Mono',monospace; color:var(--faint); letter-spacing:0.04em;">BASELINE TOTAL</span>
          <span style="font:600 20px 'JetBrains Mono',monospace; color:var(--red);">${baselineTotal.toLocaleString()}</span>
        </div>
      </div>
    </div>

    <div style="background:var(--panel); border:1px solid var(--border); border-radius:16px; padding:18px; display:flex; flex-direction:column; gap:14px;">
      <div style="display:flex; align-items:center; justify-content:space-between; gap:12px;">
        <label style="font:600 13px 'Space Grotesk'; color:var(--text);">Enter a query</label>
        <span style="font:400 11px 'JetBrains Mono',monospace; color:var(--faint);">local router · 0 tokens to decide</span>
      </div>
      <textarea id="prompt-input" rows="3" placeholder="e.g. What is 12 + 7?  ·  or  ·  Explain why transformers scale better than RNNs" style="width:100%; resize:vertical; background:var(--bg); color:var(--text); border:1px solid var(--border); border-radius:11px; padding:13px 15px; font:400 14px/1.5 'Space Grotesk',sans-serif;">${esc(s.prompt)}</textarea>
      <div style="display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap;">
        <div style="display:flex; gap:8px; flex-wrap:wrap;">${chipsHtml}</div>
        <button id="run-btn" ${runBtnDisabledAttr} style="${runBtnStyle}">${s.running ? "Routing…" : "Run through router"}</button>
      </div>
    </div>

    <div style="display:flex; flex-direction:column; gap:10px;">
      <div style="font:600 12px 'JetBrains Mono',monospace; color:var(--faint); letter-spacing:0.06em; padding-left:2px;">ROUTING PIPELINE</div>
      <div style="display:flex; gap:12px; flex-wrap:wrap;">${stepsHtml}</div>
    </div>

    ${answerHtml}
    ${historyHtml}
  `;

  // event listeners re-attached each render since innerHTML wipes the old ones
  const promptEl = document.getElementById("prompt-input");
  if (promptEl) {
    promptEl.addEventListener("input", onInput);
    promptEl.selectionStart = promptEl.selectionEnd = promptEl.value.length;
  }
  const runBtn = document.getElementById("run-btn");
  if (runBtn) runBtn.addEventListener("click", run);
  const resetBtn = document.getElementById("reset-btn");
  if (resetBtn) resetBtn.addEventListener("click", reset);
  document.querySelectorAll("[data-example-idx]").forEach((el) => {
    el.addEventListener("click", pickExample(EXAMPLES[+el.getAttribute("data-example-idx")]));
  });
}

render();
fetchConfig();
</script>
</body>
</html>
